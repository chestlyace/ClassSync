<script>
        // Simple micro-interaction for join buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', function() {
                this.classList.add('scale-95');
            });
            button.addEventListener('mouseup', function() {
                this.classList.remove('scale-95');
            });
            button.addEventListener('mouseleave', function() {
                this.classList.remove('scale-95');
            });
        });

        // Toggle state for 'Join' click (simulated)
        const joinButtons = document.querySelectorAll('button:not([disabled])');
        joinButtons.forEach(btn => {
            if(btn.innerText.trim() === 'Join') {
                btn.addEventListener('click', () => {
                    const ripple = document.createElement('div');
                    ripple.className = 'fixed inset-0 bg-primary/10 pointer-events-none transition-opacity duration-300 opacity-0';
                    document.body.appendChild(ripple);
                    setTimeout(() => ripple.style.opacity = '1', 10);
                    setTimeout(() => ripple.style.opacity = '0', 300);
                    setTimeout(() => ripple.remove(), 600);
                });
            }
        });
    </script>
