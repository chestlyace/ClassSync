<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#895600",
                        "surface-container": "#e9edff",
                        "on-secondary-fixed-variant": "#00513e",
                        "tertiary": "#694100",
                        "on-error": "#ffffff",
                        "on-surface-variant": "#434654",
                        "secondary-fixed-dim": "#6cdab6",
                        "secondary-container": "#89f7d1",
                        "inverse-surface": "#293040",
                        "surface-variant": "#dce2f7",
                        "on-secondary-fixed": "#002117",
                        "secondary": "#006c53",
                        "surface-tint": "#1353d8",
                        "surface": "#f9f9ff",
                        "primary-container": "#1a56db",
                        "secondary-fixed": "#89f7d1",
                        "outline-variant": "#c3c5d7",
                        "primary-fixed-dim": "#b5c4ff",
                        "surface-container-high": "#e1e8fd",
                        "on-secondary-container": "#007258",
                        "primary": "#003fb1",
                        "on-background": "#141b2b",
                        "surface-dim": "#d3daef",
                        "tertiary-fixed-dim": "#ffb95f",
                        "outline": "#737686",
                        "on-tertiary-fixed": "#2a1700",
                        "on-primary-fixed-variant": "#003dab",
                        "surface-container-low": "#f1f3ff",
                        "error": "#ba1a1a",
                        "inverse-on-surface": "#edf0ff",
                        "surface-container-lowest": "#ffffff",
                        "on-primary": "#ffffff",
                        "inverse-primary": "#b5c4ff",
                        "surface-bright": "#f9f9ff",
                        "on-primary-container": "#d4dcff",
                        "error-container": "#ffdad6",
                        "background": "#f9f9ff",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "tertiary-fixed": "#ffddb8",
                        "primary-fixed": "#dbe1ff",
                        "on-tertiary-fixed-variant": "#653e00",
                        "on-primary-fixed": "#00174d",
                        "on-tertiary": "#ffffff",
                        "on-surface": "#141b2b",
                        "surface-container-highest": "#dce2f7",
                        "on-tertiary-container": "#ffd6a8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "touch-target-height": "52px",
                        "gutter-stack": "12px",
                        "padding-card": "16px",
                        "icon-size-md": "24px",
                        "margin-page": "16px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "headline-sm": ["16px", {"lineHeight": "24px", "fontWeight": "700"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .floating-label-input:focus-within label,
        .floating-label-input input:not(:placeholder-shown) + label,
        .floating-label-input textarea:not(:placeholder-shown) + label {
            transform: translateY(-20px) scale(0.85);
            color: #006c53; /* secondary teal */
            background-color: white;
            padding: 0 4px;
        }
        .segmented-control-active {
            background-color: #006c53;
            color: white;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md selection:bg-secondary-container">
<!-- Top AppBar (JSON Manual Implementation) -->
<header class="fixed top-0 w-full h-14 z-50 flex items-center px-margin-page bg-surface border-b border-outline-variant">
<div class="flex items-center justify-between w-full">
<button class="w-10 h-10 flex items-center justify-start text-on-surface-variant active:scale-95 transition-transform">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-on-surface">New Assignment</h1>
<button class="font-label-md text-label-md text-primary font-bold active:opacity-70 transition-opacity">
                Save
            </button>
</div>
</header>
<main class="pt-14 pb-24 px-margin-page min-h-screen">
<form class="mt-6 space-y-6" id="assignment-form">
<!-- Title Input -->
<div class="relative floating-label-input">
<input class="block w-full h-touch-target-height px-4 text-body-lg font-body-lg bg-surface-container-lowest border border-outline-variant rounded-lg focus:outline-none focus:border-secondary transition-colors peer" id="assignment-title" placeholder=" " type="text"/>
<label class="absolute left-4 top-4 text-on-surface-variant font-label-md text-label-md transition-all pointer-events-none origin-left" for="assignment-title">
                    Assignment Title
                </label>
</div>
<!-- Description Input -->
<div class="relative floating-label-input">
<textarea class="block w-full px-4 py-4 text-body-lg font-body-lg bg-surface-container-lowest border border-outline-variant rounded-lg focus:outline-none focus:border-secondary transition-colors peer min-h-[120px]" id="assignment-desc" placeholder=" " rows="4"></textarea>
<label class="absolute left-4 top-4 text-on-surface-variant font-label-md text-label-md transition-all pointer-events-none origin-left" for="assignment-desc">
                    Description
                </label>
</div>
<!-- Due Date Field -->
<div class="relative group cursor-pointer" onclick="console.log('Open Date Picker')">
<div class="flex items-center justify-between w-full h-touch-target-height px-4 bg-surface-container-lowest border border-outline-variant rounded-lg active:bg-surface-container-low transition-colors">
<div class="flex flex-col">
<span class="text-label-sm font-label-sm text-on-surface-variant">Due Date</span>
<span class="text-body-md font-body-md text-on-surface">Select date and time</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant">calendar_today</span>
</div>
</div>
<!-- Assignment Type Segmented Control -->
<div class="space-y-3">
<label class="text-label-md font-label-md text-on-surface-variant px-1">Assignment Type</label>
<div class="flex p-1 bg-surface-container border border-outline-variant rounded-xl">
<button class="flex-1 h-10 rounded-lg text-label-md font-label-md transition-all segmented-control-active" id="btn-individual" onclick="toggleType('individual')" type="button">
                        Individual
                    </button>
<button class="flex-1 h-10 rounded-lg text-label-md font-label-md transition-all text-on-surface-variant" id="btn-group" onclick="toggleType('group')" type="button">
                        Group
                    </button>
</div>
</div>
<!-- Expandable Group Section -->
<div class="hidden overflow-hidden transition-all duration-300 ease-in-out opacity-0 max-h-0" id="group-section">
<div class="p-4 bg-secondary-container/10 border border-secondary-container/30 rounded-xl space-y-4">
<div class="flex items-center justify-between">
<div class="flex flex-col">
<span class="text-label-md font-label-md text-on-secondary-container">Max group size</span>
<span class="text-label-sm font-label-sm text-outline">Recommended: 3-5 students</span>
</div>
<div class="flex items-center space-x-4 bg-surface-container-lowest border border-outline-variant rounded-lg p-1">
<button class="w-10 h-10 flex items-center justify-center text-secondary active:scale-90 transition-transform" onclick="updateStepper(-1)" type="button">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="w-6 text-center font-headline-sm text-headline-sm text-on-surface" id="stepper-value">2</span>
<button class="w-10 h-10 flex items-center justify-center text-secondary active:scale-90 transition-transform" onclick="updateStepper(1)" type="button">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
</div>
</div>
<!-- Attachments Placeholder -->
<div class="pt-2">
<button class="flex items-center justify-center w-full h-12 border-2 border-dashed border-outline-variant rounded-lg text-on-surface-variant font-label-md text-label-md hover:bg-surface-container-low transition-colors" type="button">
<span class="material-symbols-outlined mr-2">attach_file</span>
                    Add resources or templates
                </button>
</div>
</form>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full p-4 bg-surface border-t border-outline-variant z-50">
<button class="w-full h-touch-target-height bg-secondary text-on-secondary rounded-xl font-label-md text-label-md shadow-sm active:scale-[0.98] transition-all flex items-center justify-center">
            Post Assignment
        </button>
</div>
<script>
        function toggleType(type) {
            const indBtn = document.getElementById('btn-individual');
            const grpBtn = document.getElementById('btn-group');
            const groupSection = document.getElementById('group-section');

            if (type === 'group') {
                grpBtn.classList.add('segmented-control-active');
                grpBtn.classList.remove('text-on-surface-variant');
                indBtn.classList.remove('segmented-control-active');
                indBtn.classList.add('text-on-surface-variant');
                
                groupSection.classList.remove('hidden', 'opacity-0', 'max-h-0');
                groupSection.classList.add('opacity-100', 'max-h-40');
            } else {
                indBtn.classList.add('segmented-control-active');
                indBtn.classList.remove('text-on-surface-variant');
                grpBtn.classList.remove('segmented-control-active');
                grpBtn.classList.add('text-on-surface-variant');
                
                groupSection.classList.add('opacity-0', 'max-h-0');
                setTimeout(() => groupSection.classList.add('hidden'), 300);
            }
        }

        let stepperCount = 2;
        function updateStepper(val) {
            stepperCount = Math.max(2, Math.min(10, stepperCount + val));
            document.getElementById('stepper-value').innerText = stepperCount;
        }

        // Add visual feedback to inputs
        const inputs = document.querySelectorAll('input, textarea');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('focused');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('focused');
            });
        });
    </script>
</body></html>
