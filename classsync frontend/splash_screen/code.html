<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-custom {
            animation: spin 1s linear infinite;
        }
        .logo-container {
            position: relative;
            width: 120px;
            height: 120px;
        }
        .circle-c {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 12px solid white;
            border-radius: 50%;
            border-right-color: transparent;
            transform: rotate(-45deg);
            top: 0;
            left: 0;
        }
        .circle-s {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 12px solid #b5c4ff;
            border-radius: 50%;
            border-left-color: transparent;
            transform: rotate(-45deg);
            bottom: 0;
            right: 0;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-primary-container text-on-primary">
<!-- Splash Screen Container -->
<main class="flex flex-col items-center justify-center w-full h-screen relative px-margin-page overflow-hidden">
<!-- Center Content Branding -->
<div class="flex flex-col items-center space-y-6">
<!-- App Logo (Overlapping C and S) -->
<div class="logo-container mb-4">
<div class="circle-c"></div>
<div class="circle-s"></div>
</div>
<!-- App Name & Tagline -->
<div class="text-center space-y-2">
<h1 class="font-headline-lg text-[40px] leading-tight text-white tracking-tight">
                    ClassSync
                </h1>
<p class="font-body-lg text-on-primary-container opacity-80">
                    Assignments. Groups. Done.
                </p>
</div>
</div>
<!-- Loading Indicator -->
<div class="absolute bottom-16 flex flex-col items-center space-y-4">
<div class="animate-spin-custom">
<span class="material-symbols-outlined text-white text-[32px]" data-icon="progress_activity">
                    progress_activity
                </span>
</div>
</div>
</main>
<!-- Micro-interaction script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Subtle entrance animation for the logo
            const logo = document.querySelector('.logo-container');
            logo.style.opacity = '0';
            logo.style.transform = 'scale(0.8)';
            
            setTimeout(() => {
                logo.style.transition = 'all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)';
                logo.style.opacity = '1';
                logo.style.transform = 'scale(1)';
            }, 100);

            // Simulate transition to login/home screen after 3 seconds
            // This is just for demonstration as requested
            /*
            setTimeout(() => {
                document.body.style.transition = 'opacity 0.5s ease';
                document.body.style.opacity = '0';
            }, 3000);
            */
        });
    </script>
</body></html>
