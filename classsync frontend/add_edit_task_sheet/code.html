                    Delete Task

<!-- Interactive Logic -->
<script>
        function toggleSheet() {
            const sheet = document.getElementById('bottomSheet');
            if (sheet.classList.contains('translate-y-0')) {
                sheet.style.transform = 'translateY(100%)';
                setTimeout(() => {
                    // Logic to actually close or navigate back would go here
                }, 300);
            } else {
                sheet.style.transform = 'translateY(0)';
            }
        }

        // Add subtle scale animation to member chips on click
        document.querySelectorAll('.flex-shrink-0').forEach(chip => {
            chip.addEventListener('click', function() {
                this.classList.add('scale-95');
                setTimeout(() => this.classList.remove('scale-95'), 100);
            });
        });
    </script>
