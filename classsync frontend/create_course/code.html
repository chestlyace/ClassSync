<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Course - ClassSync</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-bright": "#f9f9ff",
                    "on-primary-container": "#d4dcff",
                    "secondary-container": "#89f7d1",
                    "surface": "#f9f9ff",
                    "on-secondary": "#ffffff",
                    "on-primary-fixed": "#00174d",
                    "on-secondary-fixed": "#002117",
                    "error": "#ba1a1a",
                    "secondary-fixed-dim": "#6cdab6",
                    "primary-fixed": "#dbe1ff",
                    "on-primary": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "surface-container": "#e9edff",
                    "primary-fixed-dim": "#b5c4ff",
                    "on-secondary-fixed-variant": "#00513e",
                    "inverse-on-surface": "#edf0ff",
                    "on-error-container": "#93000a",
                    "on-tertiary-fixed": "#2a1700",
                    "background": "#f9f9ff",
                    "tertiary-fixed-dim": "#ffb95f",
                    "outline-variant": "#c3c5d7",
                    "on-background": "#141b2b",
                    "surface-dim": "#d3daef",
                    "outline": "#737686",
                    "on-tertiary-container": "#ffd6a8",
                    "tertiary-fixed": "#ffddb8",
                    "secondary": "#006c53",
                    "on-surface": "#141b2b",
                    "on-primary-fixed-variant": "#003dab",
                    "surface-container-highest": "#dce2f7",
                    "surface-tint": "#1353d8",
                    "inverse-primary": "#b5c4ff",
                    "secondary-fixed": "#89f7d1",
                    "primary-container": "#1a56db",
                    "inverse-surface": "#293040",
                    "primary": "#003fb1",
                    "error-container": "#ffdad6",
                    "tertiary": "#694100",
                    "surface-variant": "#dce2f7",
                    "on-surface-variant": "#434654",
                    "tertiary-container": "#895600",
                    "surface-container-low": "#f1f3ff",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-fixed-variant": "#653e00",
                    "on-secondary-container": "#007258",
                    "on-error": "#ffffff",
                    "surface-container-high": "#e1e8fd"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "padding-card": "16px",
                    "touch-target-height": "52px",
                    "margin-page": "16px",
                    "icon-size-md": "24px",
                    "gutter-stack": "12px"
            },
            "fontFamily": {
                    "headline-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "headline-sm": ["Inter"],
                    "body-md": ["Inter"],
                    "label-sm": ["Inter"],
                    "label-md": ["Inter"],
                    "headline-lg": ["Inter"],
                    "mono": ["JetBrains Mono"]
            },
            "fontSize": {
                    "headline-md": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-sm": ["16px", {"lineHeight": "24px", "fontWeight": "700"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                    "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                    "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .sheet-shadow {
            box-shadow: 0 -4px 20px -5px rgba(0, 0, 0, 0.1);
        }
        .backdrop-blur-custom {
            backdrop-filter: blur(4px);
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #006c53 !important;
            box-shadow: 0 0 0 1px #006c53;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body-md text-on-surface min-h-screen relative overflow-hidden">
<!-- Background: Teacher Home Screen (Dimmed) -->
<div class="fixed inset-0 z-0 bg-surface-bright p-margin-page opacity-40 select-none pointer-events-none">
<header class="h-14 flex items-center justify-between mb-8">
<h1 class="font-headline-md text-headline-md text-primary">ClassSync</h1>
<div class="w-10 h-10 rounded-full bg-surface-container-high border border-outline-variant"></div>
</header>
<div class="space-y-4">
<div class="h-[120px] bg-surface-container-lowest border border-outline-variant rounded-xl p-4 flex flex-col justify-between">
<div class="w-2/3 h-6 bg-surface-container rounded-lg"></div>
<div class="w-full h-4 bg-surface-container-low rounded-lg"></div>
</div>
<div class="h-[120px] bg-surface-container-lowest border border-outline-variant rounded-xl p-4 flex flex-col justify-between">
<div class="w-2/3 h-6 bg-surface-container rounded-lg"></div>
<div class="w-full h-4 bg-surface-container-low rounded-lg"></div>
</div>
<div class="h-[120px] bg-surface-container-lowest border border-outline-variant rounded-xl p-4 flex flex-col justify-between">
<div class="w-2/3 h-6 bg-surface-container rounded-lg"></div>
<div class="w-full h-4 bg-surface-container-low rounded-lg"></div>
</div>
</div>
</div>
<!-- Scrim / Dimmed Overlay -->
<div class="fixed inset-0 bg-on-background/40 backdrop-blur-custom z-10" id="scrim"></div>
<!-- Create Course Bottom Sheet -->
<div class="fixed inset-x-0 bottom-0 z-20 transition-transform duration-300 ease-out translate-y-0" id="bottomSheet">
<div class="bg-surface-container-lowest rounded-t-[28px] border-t border-outline-variant sheet-shadow w-full max-w-md mx-auto flex flex-col pb-10">
<!-- Handle Bar -->
<div class="flex justify-center pt-4 pb-2">
<div class="w-10 h-1 bg-outline-variant rounded-full"></div>
</div>
<!-- Header -->
<div class="px-margin-page py-4">
<h2 class="font-headline-lg text-headline-lg text-on-surface">New Course</h2>
</div>
<!-- Content Container -->
<div class="px-margin-page space-y-6">
<!-- Course Name Input -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="courseName">Course name</label>
<input class="w-full h-touch-target-height px-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-lg text-body-lg text-on-surface placeholder:text-outline focus:ring-0" id="courseName" placeholder="e.g. Advanced Calculus II" type="text"/>
</div>
<!-- Description Input -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="description">Description</label>
<textarea class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-0 resize-none" id="description" placeholder="Brief overview of course objectives..." rows="3"></textarea>
</div>
<!-- Join Code Section -->
<div class="space-y-3 pt-2">
<label class="font-label-md text-label-md text-on-surface-variant">Join Code</label>
<div class="flex items-center gap-3">
<div class="flex-1 h-touch-target-height bg-surface-container-low border border-outline-variant rounded-full flex items-center px-6 justify-between group">
<span class="font-mono text-headline-sm tracking-widest text-on-surface">CS-8294</span>
<button class="text-on-surface-variant hover:text-secondary transition-colors" title="Copy code">
<span class="material-symbols-outlined text-icon-size-md" data-icon="content_copy">content_copy</span>
</button>
</div>
</div>
<p class="font-label-sm text-label-sm text-outline px-2">
                        The join code is auto-generated. Share it with your students.
                    </p>
</div>
<!-- Action Buttons -->
<div class="pt-4 flex flex-col gap-4">
<button class="w-full h-touch-target-height bg-secondary hover:bg-on-secondary-fixed-variant text-on-secondary font-label-md text-label-md rounded-lg transition-all active:scale-[0.98] flex items-center justify-center">
                        Create Course
                    </button>
<button class="w-full h-touch-target-height text-secondary font-label-md text-label-md rounded-lg hover:bg-secondary-container/20 transition-all" id="closeBtn">
                        Cancel
                    </button>
</div>
</div>
</div>
</div>
<!-- Inline Script for Interactions -->
<script>
        const sheet = document.getElementById('bottomSheet');
        const scrim = document.getElementById('scrim');
        const closeBtn = document.getElementById('closeBtn');

        function closeSheet() {
            sheet.style.transform = 'translateY(100%)';
            scrim.style.opacity = '0';
            setTimeout(() => {
                scrim.style.display = 'none';
            }, 300);
        }

        closeBtn.addEventListener('click', closeSheet);
        scrim.addEventListener('click', closeSheet);

        // Simple animation on load
        window.addEventListener('DOMContentLoaded', () => {
            sheet.style.transform = 'translateY(100%)';
            setTimeout(() => {
                sheet.style.transition = 'transform 0.4s cubic-bezier(0.2, 0.8, 0.4, 1)';
                sheet.style.transform = 'translateY(0)';
            }, 100);
        });

        // Copy Code interaction
        const copyBtn = document.querySelector('button[title="Copy code"]');
        copyBtn.addEventListener('click', () => {
            const icon = copyBtn.querySelector('.material-symbols-outlined');
            icon.innerText = 'check';
            icon.classList.add('text-secondary');
            setTimeout(() => {
                icon.innerText = 'content_copy';
                icon.classList.remove('text-secondary');
            }, 2000);
        });
    </script>
</body></html>
