                    "borderRadius": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f9f9ff;
            color: #141b2b;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .input-focus:focus-within {
            border-color: #003fb1;
            box-shadow: 0 0 0 1px #003fb1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen">
<header class="fixed top-0 w-full h-14 z-50 flex items-center px-margin-page bg-surface dark:bg-on-background border-b border-outline-variant dark:border-outline">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="school">school</span>
<span class="font-headline-sm text-headline-sm-mobile md:text-headline-sm font-bold text-primary dark:text-inverse-primary">ClassSync</span>
</div>
</header>
<main class="flex-grow pt-20 pb-8 px-margin-page flex flex-col items-center">
<div class="w-full max-w-md space-y-8">
<div class="flex flex-col items-center text-center space-y-4">
<div class="w-full max-w-[280px] aspect-square overflow-hidden rounded-xl bg-surface-container-low">
<img alt="Abstract student illustration" class="w-full h-full object-cover" data-alt="A clean, minimalist flat vector illustration showing abstract student silhouettes and floating book shapes in a professional academic style. The artwork uses a sophisticated palette of primary blue and soft greys against a crisp white background. The composition is balanced and modern, emphasizing clarity and educational focus through geometric simplicity and bright, even lighting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDYz91e87r7Cqh-bcYGHkxTMILD3ouTPo6NQmmt0oBivrCcZPOIeNJ5STjVyXCrdl4xGIIpnuRYg3A68RRY2Tp3MXiClNkIecCsvg7dgV3vgOHYuzyWM_oC_-jtqcKujNKj2CW0hxt06GAZ3UMGiS1LSK6bmwbCWGUQzopqkjIhFJrZ7tHPU6yOWOCPkTUL6LA-FF3TXw-lZr4qC7KGzqSsrbqwhiNxmristj1hhhNDDnPinOnzfq8re3L82w8qmOSLhnVsi4KVCRJ-"/>
</div>
<h1 class="font-headline-lg text-headline-lg-mobile text-on-surface">Welcome back</h1>
</div>
<form class="space-y-6" onsubmit="event.preventDefault()">
<div class="space-y-4">
<div class="relative flex flex-col">
<label class="font-label-sm text-label-sm text-on-surface-variant mb-2" for="email">Email address</label>
<input class="h-touch-target-height w-full px-4 border border-outline-variant rounded-lg bg-surface-container-lowest font-body-md text-body-md outline-none transition-all input-focus" id="email" placeholder="student@university.edu" type="email"/>
</div>
<div class="relative flex flex-col">
<label class="font-label-sm text-label-sm text-on-surface-variant mb-2" for="password">Password</label>
<div class="relative flex items-center">
<input class="h-touch-target-height w-full px-4 pr-12 border border-outline-variant rounded-lg bg-surface-container-lowest font-body-md text-body-md outline-none transition-all input-focus" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 p-1 hover:bg-surface-container-low rounded-full transition-colors flex items-center justify-center" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-outline" data-icon="visibility" id="visibility_icon">visibility</span>
</button>
</div>
<div class="flex justify-end mt-2">
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Forgot password?</a>
</div>
</div>
</div>
<div class="pt-2">
<button class="w-full h-touch-target-height bg-primary-container text-on-primary font-label-md text-label-md rounded-lg active:scale-[0.98] transition-transform duration-150 flex items-center justify-center" type="submit">
                        Log in
                    </button>
</div>
</form>
<div class="flex items-center gap-4 py-2">
<div class="flex-grow h-[1px] bg-outline-variant"></div>
<span class="font-label-sm text-label-sm text-outline">or</span>
<div class="flex-grow h-[1px] bg-outline-variant"></div>
</div>
<div class="flex flex-col items-center gap-4">
<button class="w-full h-touch-target-height bg-surface-container-lowest border border-outline-variant text-secondary font-label-md text-label-md rounded-lg hover:bg-surface-container-low transition-colors flex items-center justify-center">
                    Create an account
                </button>
<p class="font-label-sm text-label-sm text-on-surface-variant text-center">
                    By continuing, you agree to our <a class="text-primary underline" href="#">Terms of Service</a>.
                </p>
</div>
</div>
</main>
<footer class="mt-auto py-6 px-margin-page flex justify-center items-center">
<p class="font-label-sm text-label-sm text-outline-variant">© 2024 ClassSync Academic Platforms</p>
</footer>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const visibilityIcon = document.getElementById('visibility_icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                visibilityIcon.innerText = 'visibility';
            }
        }

        document.querySelectorAll('button, a').forEach(el => {
            el.addEventListener('click', (e) => {
                if (el.getAttribute('href') === '#') e.preventDefault();
                
                const ripple = document.createElement('div');
                ripple.classList.add('ripple');
                el.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });
    </script>
</body></html>
